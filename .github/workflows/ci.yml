name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    name: Build (lake)
    runs-on: ubuntu-latest
    steps:
      # The lakefile requires the sibling LeanRoughPaths checkout at
      # ../lean-rough-paths, so both repositories are checked out side
      # by side inside the workspace.
      - name: Check out LeanBSeries
        uses: actions/checkout@v4
        with:
          path: lean-b-series

      - name: Check out LeanRoughPaths (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: daniil-shmelev/LeanRoughPaths
          path: lean-rough-paths

      - name: Build with Lake
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean-b-series
          use-mathlib-cache: true
